<svg width="1080" height="280" viewBox="0 0 1080 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="45%" style="stop-color:#1a1550"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c4de6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6c4de6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00c3a4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="60%" style="stop-color:#e0d7ff"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="280" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="46" x2="1080" y2="46"/>
    <line x1="0" y1="93" x2="1080" y2="93"/>
    <line x1="0" y1="140" x2="1080" y2="140"/>
    <line x1="0" y1="187" x2="1080" y2="187"/>
    <line x1="0" y1="234" x2="1080" y2="234"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
    <line x1="900" y1="0" x2="900" y2="280"/>
  </g>

  <!-- Corner glows -->
  <circle cx="0"    cy="0"   r="120" fill="#6c4de6" fill-opacity="0.08"/>
  <circle cx="1080" cy="280" r="140" fill="#00c3a4" fill-opacity="0.06"/>
  <circle cx="1080" cy="0"   r="80"  fill="#6c4de6" fill-opacity="0.05"/>
  <circle cx="0"    cy="280" r="90"  fill="#00c3a4" fill-opacity="0.05"/>

  <!-- Accent line -->
  <rect x="0" y="138" width="1080" height="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Title -->
  <text x="540" y="76"
    font-family="'Courier New', Consolas, monospace"
    font-size="38" font-weight="700"
    text-anchor="middle"
    fill="url(#tg)"
    letter-spacing="-0.5">automation-ai-n8n-docker</text>

  <!-- Subtitle -->
  <text x="540" y="111"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="14.5" font-weight="400"
    text-anchor="middle"
    fill="#94a3b8"
    letter-spacing="0.4">PM Documentation &amp; DB Analyzer Bot  ·  Telegram  ·  Local AI  ·  Google Drive</text>

  <!-- Divider dots -->
  <circle cx="480" cy="130" r="2" fill="#6c4de6" fill-opacity="0.7"/>
  <circle cx="540" cy="130" r="2" fill="#6c4de6" fill-opacity="0.7"/>
  <circle cx="600" cy="130" r="2" fill="#6c4de6" fill-opacity="0.7"/>

  <!-- TECH STACK label -->
  <text x="540" y="160"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="9.5" font-weight="400"
    text-anchor="middle"
    fill="#64748b"
    letter-spacing="2.5">TECH STACK</text>

  <!--
    Badge layout: 9 badges, each 100px wide, 10px gap
    Total = 9*100 + 8*10 = 980px, centered in 1080 → start x = (1080-980)/2 = 50
    Centers: 100, 210, 320, 430, 540, 650, 760, 870, 980
    Each badge: rect x=(center-50), y=170, w=100, h=52, rx=8
    Icon centered at (center, 187)
    Name  at (center, 207) font-size=11 bold text-anchor=middle
    Sub   at (center, 219) font-size=8.5 text-anchor=middle fill=#64748b
  -->

  <!-- ── n8n ── center=100 -->
  <rect x="50" y="170" width="100" height="52" rx="8" fill="#1e1339" stroke="#ea4c24" stroke-width="1" stroke-opacity="0.8"/>
  <!-- icon: 3-node workflow -->
  <circle cx="88" cy="187" r="4.5" fill="#ea4c24"/>
  <circle cx="100" cy="197" r="4.5" fill="#ea4c24"/>
  <circle cx="112" cy="187" r="4.5" fill="#ea4c24"/>
  <line x1="88" y1="187" x2="100" y2="197" stroke="#ea4c24" stroke-width="1.5"/>
  <line x1="100" y1="197" x2="112" y2="187" stroke="#ea4c24" stroke-width="1.5"/>
  <text x="100" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#ea4c24" text-anchor="middle">n8n</text>
  <text x="100" y="219" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">Workflow Engine</text>

  <!-- ── Docker ── center=210 -->
  <rect x="160" y="170" width="100" height="52" rx="8" fill="#0d1f38" stroke="#2496ed" stroke-width="1" stroke-opacity="0.8"/>
  <!-- icon: stacked container boxes -->
  <rect x="195" y="181" width="9" height="6" rx="1" fill="#2496ed"/>
  <rect x="206" y="181" width="9" height="6" rx="1" fill="#2496ed"/>
  <rect x="195" y="189" width="9" height="6" rx="1" fill="#2496ed"/>
  <rect x="206" y="189" width="9" height="6" rx="1" fill="#2496ed"/>
  <rect x="217" y="189" width="9" height="6" rx="1" fill="#2496ed"/>
  <line x1="200" y1="197" x2="221" y2="197" stroke="#2496ed" stroke-width="1.5"/>
  <path d="M218 195 Q224 192 226 196" fill="none" stroke="#2496ed" stroke-width="1.5"/>
  <text x="210" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#2496ed" text-anchor="middle">Docker</text>
  <text x="210" y="219" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">Compose</text>

  <!-- ── Qdrant ── center=320 -->
  <rect x="270" y="170" width="100" height="52" rx="8" fill="#1a0d2e" stroke="#dc7eff" stroke-width="1" stroke-opacity="0.8"/>
  <!-- icon: vector cluster dots -->
  <circle cx="311" cy="185" r="4"   fill="#dc7eff"/>
  <circle cx="323" cy="191" r="3"   fill="#dc7eff" fill-opacity="0.75"/>
  <circle cx="315" cy="197" r="2.5" fill="#dc7eff" fill-opacity="0.55"/>
  <circle cx="328" cy="183" r="2"   fill="#dc7eff" fill-opacity="0.45"/>
  <line x1="311" y1="185" x2="323" y2="191" stroke="#dc7eff" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="311" y1="185" x2="315" y2="197" stroke="#dc7eff" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="323" y1="191" x2="328" y2="183" stroke="#dc7eff" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="320" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#dc7eff" text-anchor="middle">Qdrant</text>
  <text x="320" y="219" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">Vector DB</text>

  <!-- ── Ollama ── center=430 -->
  <rect x="380" y="170" width="100" height="52" rx="8" fill="#0d1f18" stroke="#34d399" stroke-width="1" stroke-opacity="0.8"/>
  <!-- icon: simple llama head -->
  <circle cx="430" cy="186" r="5" fill="#34d399"/>
  <ellipse cx="430" cy="196" rx="7" ry="5" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <line x1="425" y1="201" x2="423" y2="207" stroke="#34d399" stroke-width="1.5"/>
  <line x1="435" y1="201" x2="437" y2="207" stroke="#34d399" stroke-width="1.5"/>
  <text x="430" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">Ollama</text>
  <text x="430" y="219" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">mistral:7b  ·  Local AI</text>

  <!-- ── Telegram ── center=540 -->
  <rect x="490" y="170" width="100" height="52" rx="8" fill="#0d1e36" stroke="#2aabee" stroke-width="1" stroke-opacity="0.8"/>
  <!-- icon: paper plane -->
  <path d="M521 200 L543 185 L530 208 Z" fill="#2aabee" fill-opacity="0.25"/>
  <path d="M521 200 L543 185" stroke="#2aabee" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M530 208 L527 214 L521 200 L543 185" stroke="#2aabee" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
  <text x="540" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#2aabee" text-anchor="middle">Telegram</text>
  <text x="540" y="219" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">Bot Interface</text>

  <!-- ── Cloudflare ── center=650 -->
  <rect x="600" y="170" width="100" height="52" rx="8" fill="#1f1200" stroke="#f6821f" stroke-width="1" stroke-opacity="0.8"/>
  <!-- icon: cloud shape -->
  <ellipse cx="638" cy="194" rx="8"   ry="6.5" fill="#f6821f" fill-opacity="0.85"/>
  <ellipse cx="648" cy="191" rx="6.5" ry="5"   fill="#f6821f" fill-opacity="0.85"/>
  <ellipse cx="657" cy="194" rx="6"   ry="5.5" fill="#f6821f" fill-opacity="0.85"/>
  <rect x="632" y="194" width="30" height="6" fill="#f6821f" fill-opacity="0.85"/>
  <text x="650" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#f6821f" text-anchor="middle">Cloudflare</text>
  <text x="650" y="219" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">Tunnel</text>

  <!-- ── Google Drive ── center=760 -->
  <rect x="710" y="170" width="100" height="52" rx="8" fill="#0f1a10" stroke="#34a853" stroke-width="1" stroke-opacity="0.8"/>
  <!-- icon: Google Drive triangle -->
  <polygon points="750,202 760,185 770,202" fill="#34a853" fill-opacity="0.9"/>
  <polygon points="757,185 767,202 775,190" fill="#fbbc04" fill-opacity="0.9"/>
  <polygon points="750,202 763,202 757,190" fill="#4285f4" fill-opacity="0.9"/>
  <text x="760" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#34a853" text-anchor="middle">Google Drive</text>
  <text x="760" y="219" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">Docs</text>

  <!-- ── MariaDB ── center=870 -->
  <rect x="820" y="170" width="100" height="52" rx="8" fill="#1a1000" stroke="#c0745a" stroke-width="1" stroke-opacity="0.8"/>
  <!-- icon: cylinder -->
  <ellipse cx="870" cy="185" rx="12" ry="4"   fill="#c0745a" fill-opacity="0.8"/>
  <rect    x="858" y="185" width="24" height="12" fill="#c0745a" fill-opacity="0.55"/>
  <ellipse cx="870" cy="197" rx="12" ry="4"   fill="#c0745a" fill-opacity="0.9"/>
  <text x="870" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#c0745a" text-anchor="middle">MariaDB</text>
  <text x="870" y="219" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">PerconaDB</text>

  <!-- ── Ubuntu ── center=980 -->
  <rect x="930" y="170" width="100" height="52" rx="8" fill="#1f0d00" stroke="#e95420" stroke-width="1" stroke-opacity="0.8"/>
  <!-- icon: Ubuntu logo (circle + 3 dots) -->
  <circle cx="980" cy="190" r="9"   fill="none" stroke="#e95420" stroke-width="1.5"/>
  <circle cx="980" cy="181" r="2.5" fill="#e95420"/>
  <circle cx="989" cy="196" r="2.5" fill="#e95420"/>
  <circle cx="971" cy="196" r="2.5" fill="#e95420"/>
  <text x="980" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#e95420" text-anchor="middle">Ubuntu</text>
  <text x="980" y="219" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">Server 24.04</text>

  <!-- Bottom repo path -->
  <text x="540" y="244"
    font-family="'Courier New', Consolas, monospace"
    font-size="10.5" font-weight="400"
    text-anchor="middle"
    fill="#475569"
    letter-spacing="0.3">github.com/Vointra/automation-ai-n8n-docker</text>

  <!-- Bottom accent line -->
  <rect x="0" y="253" width="1080" height="1" fill="url(#accent)" opacity="0.2"/>

  <!-- Footer badges -->
  <rect x="432" y="260" width="66" height="14" rx="3" fill="#1e293b"/>
  <text x="465" y="270"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="8" text-anchor="middle" fill="#94a3b8">MIT License</text>

  <rect x="508" y="260" width="64" height="14" rx="3" fill="#1e293b"/>
  <text x="540" y="270"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="8" text-anchor="middle" fill="#94a3b8">Docker Compose</text>

  <rect x="582" y="260" width="66" height="14" rx="3" fill="#1e293b"/>
  <text x="615" y="270"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="8" text-anchor="middle" fill="#94a3b8">OpenSSF Score</text>
</svg>
