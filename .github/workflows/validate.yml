name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate n8n workflow JSON
        run: |
          python3 -m json.tool script-flow-n8n/PM-Documentation-DB-Analyzer-Bot-v8.json >/dev/null

      - name: Validate Docker Compose config
        run: |
          cp .env.example .env
          docker compose config >/dev/null
